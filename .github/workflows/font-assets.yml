name: Font assets

on:
  workflow_dispatch:
    inputs:
      custom_font_filter:
        description: "Comma-separated font ids to build; leave empty for all active custom fonts"
        required: false
        type: string
  push:
    paths:
      - "fonts.catalog.yaml"
      - "scripts/build-catalog.mjs"
      - "scripts/build-custom-assets.mjs"
      - "scripts/data/catalog-shards.json"
      - "scripts/data/cjk-slices.json"
      - "scripts/data/named-subsets.json"
      - "requirements.txt"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/font-assets.yml"

jobs:
  upload-font-assets:
    name: Build and upload font assets
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, 'Update catalog shard data')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python font tools
        run: pnpm setup:python

      - name: Build and upload font assets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_UPLOAD_METHOD: s3
          R2_UPLOAD_CONCURRENCY: 16
          R2_UPLOAD_RETRIES: 6
          FONT_ASSETS_BUCKET: ${{ vars.FONT_ASSETS_BUCKET }}
          CUSTOM_FONT_FILTER: ${{ inputs.custom_font_filter }}
        run: pnpm deploy:fonts

      - name: Commit updated shard data
        run: |
          if git diff --quiet -- scripts/data/catalog-shards.json; then
            echo "No catalog shard data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/data/catalog-shards.json
          git commit -m "Update catalog shard data"
          git push
